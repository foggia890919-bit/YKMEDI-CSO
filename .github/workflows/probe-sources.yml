name: Probe data sources (one-off test)

on:
  workflow_dispatch:
  push:
    branches: [claude/serene-wright-yyxaca]
    paths: [".github/workflows/probe-sources.yml"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check accessibility of Korean data sources
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36"
          mkdir -p probe
          for url in \
            "https://www.smartchoice.or.kr/smc/index.do" \
            "https://www.smartchoice.or.kr/smc/mobile/dantongList.do" \
            "https://m.smartchoice.or.kr/smc/mobile/dantongList.do?type=m" \
            "https://www.smartchoice.or.kr/smc/mobile/dantongTelList.do" \
            "https://www.data.go.kr/" \
            "https://apis.data.go.kr/" ; do
            name=$(echo "$url" | sed 's|https://||; s|[/?=.]|_|g' | cut -c1-60)
            code=$(curl -sL --max-time 25 -A "$UA" -o "probe/${name}.html" -w "%{http_code}" "$url" || echo "ERR")
            size=$(wc -c < "probe/${name}.html" 2>/dev/null || echo 0)
            echo "RESULT | $code | ${size}b | $url"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: probe-results
          path: probe/
          retention-days: 1
