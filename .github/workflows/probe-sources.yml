name: Probe data sources (one-off test)

on:
  workflow_dispatch:
  push:
    branches: [claude/serene-wright-yyxaca]
    paths: [".github/workflows/probe-sources.yml"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Analyze dantongScript JS for data endpoints
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36"
          curl -sL --max-time 25 -A "$UA" -c /tmp/cookies "https://www.smartchoice.or.kr/smc/mobile/dantongList.do" -o /dev/null
          curl -sL --max-time 25 -A "$UA" "https://www.smartchoice.or.kr/smc/resources/pis/js/smartlife/dantongScript_2017.js?v=211124" -o dantong.js
          echo "=== JS 크기: $(wc -c < dantong.js) ==="
          echo "=== ajax url 목록 ==="
          grep -oE "url\s*:\s*['\"][^'\"]+" dantong.js | sort -u
          echo "=== danAllType 함수 (앞 50줄) ==="
          grep -n "function danAllType" -A 50 dantong.js | head -60
          echo "=== ajax data 파라미터 블록 ==="
          grep -n -B3 -A20 "dantongAjax\|listAjax\|searchAjax" dantong.js | head -80
