<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>상품 상세 | 폰드림</title>
<meta name="description" content="기종별 통신사 최저가와 조건을 확인하고 바로 구매 상담을 신청하세요.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="layout-header"></div>

<section class="section">
  <div class="container">
    <div class="goods" id="goods"></div>
  </div>
</section>

<!-- 구매 신청 -->
<section class="section inquiry" id="inquiry">
  <div class="container">
    <div class="section__head">
      <span class="section__tag" style="background:rgba(255,212,59,.15);color:#ffd43b;">ORDER</span>
      <h2 class="section__title">이 기종으로 구매 상담 신청하기</h2>
      <p class="section__desc">접수 즉시 담당자에게 알림이 전송되며, 영업시간 내 바로 연락드립니다.</p>
    </div>
    <div class="inquiry__grid">
      <div class="inquiry__info">
        <h3>구매 전 확인해 주세요</h3>
        <p>
          · 시세는 통신사 정책에 따라 매일 변동됩니다.<br>
          · 정확한 실구매가는 상담 시 다시 안내드립니다.<br>
          · 비대면(택배) 개통 시 신분증 진위확인이 필요합니다.<br>
          · 요금제 유지 기간 이후 자유롭게 변경 가능합니다.
        </p>
      </div>
      <div id="inquiry-form-slot"></div>
    </div>
  </div>
</section>

<div id="layout-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/inquiry.js"></script>
<script>
renderLayout("price.html");

const id = new URLSearchParams(location.search).get("id");
const phone = PHONES.find(p => p.id === id) || PHONES[0];
document.title = phone.name + " 최저가 | 폰드림";

const emoji = phone.brand === "apple" ? "📱" : "📲";
const joinName = { mnp: "번호이동", chg: "기기변경" };

document.getElementById("goods").innerHTML = `
  <div class="goods__visual"><span class="phone-emoji">${emoji}</span></div>
  <div>
    <h1 class="goods__title">${phone.name} <span style="font-size:18px;color:#6b7487;font-weight:700;">${phone.storage}</span></h1>
    <p class="goods__sub">출고가 ${won(phone.price)} · ${phone.badge ? "🔥 " + phone.badge : "오늘 시세 업데이트 완료"}</p>
    <div class="goods__meta">
      <div class="goods__meta-line"><strong>색상</strong><span>${phone.colors.join(" · ")}</span></div>
      <div class="goods__meta-line"><strong>요금제 조건</strong><span>${phone.plan} (이후 자유 변경)</span></div>
      <div class="goods__meta-line"><strong>구매 조건</strong><span>제휴카드 ✕ · 부가서비스 ✕ · 기기반납 ✕</span></div>
      <div class="goods__meta-line"><strong>수령 방법</strong><span>매장 방문 또는 전국 택배개통(당일 발송)</span></div>
    </div>
    ${CARRIERS.map(c => `
      <div class="goods-price-card">
        <div class="goods-price-card__head" style="background:${c.color};">
          <span>${c.name}</span><span style="font-size:12.5px;font-weight:700;opacity:.85;">오늘 기준</span>
        </div>
        <div class="goods-price-card__body">
          ${JOIN_TYPES.map(j => {
            const sup = phone.support[c.id][j.id];
            const v = phone.price - sup;
            return `<div class="gp-line"><span>${j.name} 지원금</span><b style="color:#2156f3;">-${won(sup)}</b></div>
              <div class="gp-line gp-total"><span>${j.name} 실구매가</span>
              <b class="${v <= 0 ? "free" : ""}">${v <= 0 ? `0원 + 차비 ${won(-v)}` : won(v)}</b></div>`;
          }).join("")}
        </div>
      </div>`).join("")}
    <a href="#inquiry" class="btn btn--blue" style="width:100%;margin-top:6px;">이 기종으로 상담 신청하기 ↓</a>
  </div>`;

// 폼에 기종 자동 선택
history.replaceState(null, "", `goods.html?id=${phone.id}&model=${encodeURIComponent(phone.name + " " + phone.storage)}`);
document.getElementById("inquiry-form-slot").innerHTML = inquiryFormHtml();
initInquiryForm(document.getElementById("inquiry-form"));
</script>
</body>
</html>
