<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>와이케이메디</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0e2b4d;
  --ink:#14202e;
  --wine:#7e1e00;
  --wine-bright:#a4300d;
  --gold:#c2a24a;
  --orange:#f2620e;
  --orange-bright:#ff7d2a;
  --accent:var(--orange);
  --accent-bright:var(--orange-bright);
  --overlay:0.06;
  --nav-h:76px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;color:#fff;background:#06101e;overflow-x:hidden;
  font-family:'Roboto','Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  -webkit-font-smoothing:antialiased;
  word-break:keep-all;overflow-wrap:break-word;line-break:strict;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--accent);color:#fff}

/* ===================== FIXED VIDEO BACKGROUND ===================== */
.video-bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:#06101e}
#ytbg{position:absolute;top:50%;left:50%;width:100vw;height:56.25vw;min-height:100vh;min-width:177.78vh;transform:translate(-50%,-50%) scale(1.45);pointer-events:none;border:0}
#bgvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none}
.video-bg::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(6,18,32,.3) 0%,rgba(6,18,32,0) 22%,rgba(8,28,40,0) 66%,rgba(6,18,32,.46) 100%),
    radial-gradient(120% 80% at 78% 8%, rgba(80,170,200,.12), transparent 55%),
    rgba(14,40,58,var(--overlay));
}
.video-bg__fallback{position:absolute;inset:0;background:radial-gradient(120% 90% at 70% 10%,#2f7fa3,#13405e 72%)}

/* ===================== NAV ===================== */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:30;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 34px;gap:24px;transition:background .25s,backdrop-filter .25s,border-color .25s;
  border-bottom:1px solid transparent;
}
.nav.scrolled{background:rgba(8,18,34,.78);backdrop-filter:saturate(160%) blur(12px);border-bottom-color:rgba(255,255,255,.1)}
.brand{display:flex;align-items:center;gap:12px}
.brand__logo{width:54px;height:54px;border-radius:13px;display:grid;place-items:center;color:var(--accent);font-weight:900;font-size:28px;background:transparent;letter-spacing:.01em}
.brand__name{font-weight:800;font-size:25px;letter-spacing:-.02em;line-height:1;color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.4);white-space:nowrap}
.brand__name small{display:block;font-size:10.5px;font-weight:700;letter-spacing:.22em;color:rgba(255,255,255,.7);margin-top:4px}
.nav__menu{display:flex;align-items:center;gap:10px}
.nav__item{display:inline-flex;align-items:center;gap:8px;height:44px;padding:0 18px;border-radius:999px;font-weight:700;font-size:15px;color:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);backdrop-filter:blur(8px);transition:.18s;white-space:nowrap}
.nav__item svg{width:18px;height:18px}
.nav__item:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.4)}
.nav__item--search{padding:0;width:44px;justify-content:center}
.nav__item--primary{background:color-mix(in srgb,var(--accent) 28%,transparent);border-color:color-mix(in srgb,var(--accent) 55%,#fff 45%);color:#fff}
.nav__item--primary:hover{background:color-mix(in srgb,var(--accent) 48%,transparent)}
.nav__toggle{display:none;width:44px;height:44px;border-radius:11px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);align-items:center;justify-content:center;flex-direction:column;gap:5px}
.nav__toggle span{display:block;width:20px;height:2px;background:#fff}

/* search overlay */
.search{position:fixed;top:0;left:0;right:0;z-index:60;height:var(--nav-h);display:none;align-items:center;padding:0 34px;background:rgba(8,18,34,.85);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.12)}
.search.is-open{display:flex}
.search form{flex:1;display:flex;align-items:center;gap:14px;max-width:760px;margin:0 auto}
.search svg{width:22px;height:22px;color:rgba(255,255,255,.7);flex:none}
.search input{flex:1;background:none;border:0;outline:none;color:#fff;font-size:20px;font-family:inherit;font-weight:600}
.search input::placeholder{color:rgba(255,255,255,.45)}
.search__close{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#fff;display:grid;place-items:center;font-size:20px;flex:none}
.search__hint{position:absolute;top:calc(var(--nav-h) + 6px);left:50%;transform:translateX(-50%);font-size:13.5px;color:rgba(255,255,255,.75)}

/* ===================== SCROLL PANELS ===================== */
main{position:relative;z-index:10}
.panel{position:relative;min-height:100vh;display:flex;align-items:center;padding:120px 34px 100px}
.panel__inner{width:100%;max-width:1180px;margin:0 auto}
.panel__copy{max-width:700px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 22px;white-space:nowrap}
.eyebrow::before{content:"";width:30px;height:2px;background:var(--gold)}
.p-title{font-size:clamp(34px,5vw,60px);line-height:1.12;font-weight:900;letter-spacing:-.03em;margin:0 0 22px;text-shadow:0 2px 30px rgba(0,0,0,.45)}
.p-title em{font-style:normal;color:var(--orange-bright);text-shadow:0 2px 24px rgba(242,98,14,.35)}
.p-sub{font-size:clamp(18px,2.2vw,24px);line-height:1.6;color:rgba(255,255,255,.9);margin:0 0 38px;max-width:600px;text-shadow:0 1px 16px rgba(0,0,0,.5)}
.p-list{list-style:none;margin:0 0 8px;padding:0;display:flex;flex-direction:column;gap:20px;max-width:760px}
.p-list li{display:flex;gap:18px;align-items:flex-start}
.p-list b{flex:none;width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:19px;background:color-mix(in srgb,var(--orange) 15%,transparent);color:#fff;border:1px solid color-mix(in srgb,var(--orange) 42%,rgba(255,255,255,.3));backdrop-filter:blur(6px)}
.p-list span{font-size:clamp(17px,1.9vw,21px);line-height:1.55;color:rgba(255,255,255,.94);font-weight:500;padding-top:7px;text-shadow:0 1px 14px rgba(0,0,0,.5)}
.p-list span strong{display:block;font-size:clamp(19px,2.1vw,25px);font-weight:800;color:#fff;letter-spacing:-.01em}
.p-list span i{display:block;font-style:normal;font-size:clamp(14px,1.5vw,17px);color:rgba(255,255,255,.74);margin-top:7px;font-weight:400;text-shadow:none}
.chips{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:34px 0 4px;max-width:560px}
.chip{display:inline-flex;align-items:center;justify-content:space-between;gap:8px;width:100%;padding:14px 18px 14px 20px;border-radius:14px;background:color-mix(in srgb,var(--orange) 30%,transparent);border:1.6px solid color-mix(in srgb,var(--orange) 60%,#fff 40%);color:#fff;font-weight:800;font-size:clamp(14px,1.5vw,16.5px);transition:.16s;cursor:pointer;font-family:inherit;backdrop-filter:blur(6px)}
.chip:hover{background:color-mix(in srgb,var(--orange) 50%,transparent);transform:translateY(-2px)}
.chip svg{width:16px;height:16px;color:#fff;flex:none}
.chip-cta{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:999px;background:linear-gradient(150deg,var(--orange),var(--orange-bright));border:0;color:#fff;font-family:inherit;font-weight:800;font-size:clamp(14px,1.5vw,16.5px);cursor:pointer;box-shadow:0 10px 24px -10px var(--orange);transition:.16s}
.chip-cta:hover{filter:brightness(1.08);transform:translateY(-2px)}
.chip-cta svg{width:16px;height:16px}
.case-toggle{display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.32);color:#fff;font-family:inherit;font-weight:700;font-size:13.5px;cursor:pointer;backdrop-filter:blur(6px);transition:.18s}
.case-toggle:hover{background:rgba(255,255,255,.14)}
.case-toggle svg{width:15px;height:15px;transition:transform .25s}
.case-toggle.open svg{transform:rotate(180deg)}
.case-list{display:grid;grid-template-rows:0fr;opacity:0;transition:grid-template-rows .35s ease,opacity .3s ease,margin .3s ease;overflow:hidden;margin-top:0}
.case-list.open{grid-template-rows:1fr;opacity:1;margin-top:14px}
.case-list>*{min-height:0}
.case-list .case{padding:14px 16px;border-radius:12px;background:rgba(8,18,34,.42);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(6px)}
.case-list .case+.case{margin-top:10px}
.case-list .case b{display:block;width:auto;height:auto;background:none;border-radius:0;color:var(--gold);font-size:clamp(17px,1.9vw,21px);font-weight:800;margin-bottom:8px;text-shadow:none;place-items:initial;letter-spacing:-.01em}
.case-list .case p{margin:0 0 12px;font-size:clamp(14.5px,1.5vw,17px);line-height:1.6;color:rgba(255,255,255,.9);font-weight:500;text-shadow:none}
.case-res{display:inline-flex;align-items:center;gap:8px;font-size:clamp(13.5px,1.4vw,15.5px);font-weight:800;color:#fff;letter-spacing:-.01em}
.case-res::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}
.actions{display:flex;gap:14px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:17px 34px;border-radius:999px;font-weight:800;font-size:16.5px;border:1.6px solid transparent;transition:.18s;white-space:nowrap}
.btn svg{width:19px;height:19px}
.btn-primary{background:color-mix(in srgb,var(--orange) 30%,transparent);color:#fff;border-color:color-mix(in srgb,var(--orange) 60%,#fff 40%);backdrop-filter:blur(6px)}
.btn-primary:hover{background:color-mix(in srgb,var(--orange) 50%,transparent);transform:translateY(-2px)}
.btn-glass{background:rgba(255,255,255,.04);color:#fff;border-color:rgba(255,255,255,.42);backdrop-filter:blur(6px)}
.btn-glass:hover{background:rgba(255,255,255,.13);transform:translateY(-2px)}

/* entrance — opacity always 1; only transform animates (never hides content) */
.up{opacity:1;transform:none}
.up.seen{animation:rise .7s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{transform:translateY(28px)}to{transform:none}}
@media(prefers-reduced-motion:reduce){.up.seen{animation:none}}

/* scroll cue */
.scroll-cue{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:15;display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:12px;font-weight:700;letter-spacing:.16em}
.scroll-cue svg{width:24px;height:24px;animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}

/* ===================== CERT FOOTER ===================== */
.footer{position:relative;z-index:10;background:#081627;border-top:1px solid rgba(255,255,255,.08);padding:64px 34px 40px}
.footer__inner{max-width:1180px;margin:0 auto}
.cert-head{text-align:center;margin-bottom:24px}
.cert-head .eyebrow{justify-content:center}
.cert-head h3{font-size:clamp(18px,2.2vw,24px);font-weight:800;letter-spacing:-.01em;margin:0;color:#fff}
.certs{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
.cert{display:flex;align-items:center;gap:9px;padding:8px 12px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(255,255,255,.03);transition:.2s}
.cert:hover{background:rgba(255,255,255,.06);border-color:rgba(242,98,14,.4)}
.cert__seal{width:34px;height:34px;border-radius:7px;flex:none;display:grid;place-items:center;color:var(--navy);background:#fff;overflow:hidden}
.cert__seal img{width:100%;height:100%;object-fit:contain;display:block}
.cert__seal svg{width:18px;height:18px}
.cert__txt b{display:block;font-size:12.5px;font-weight:800;color:#fff;letter-spacing:-.01em;white-space:nowrap}
.cert__txt span{font-size:10px;color:rgba(255,255,255,.5);font-weight:600}
.footer__company{display:flex;justify-content:space-between;align-items:flex-end;gap:28px;flex-wrap:wrap;padding-top:30px;border-top:1px solid rgba(255,255,255,.08)}
.footer__right{display:flex;flex-direction:column;align-items:flex-end;gap:14px}
.footer__company .brand__name{color:#fff}
.footer__brandrow{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.footer__brandrow .brand__logo{width:44px;height:44px;font-size:22px}
.footer__legal{color:rgba(255,255,255,.55);font-size:13.5px;line-height:1.8;margin:14px 0 0}
.footer__copy{color:rgba(255,255,255,.4);font-size:12.5px;margin:0}

/* ===================== RIGHT RAIL (kakao / blog / KMD) ===================== */
.rail{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:10px}
.rail__btn{position:relative;width:66px;height:62px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 12px 28px -8px rgba(0,0,0,.45);transition:.2s;color:#3a1d1d;text-align:center}
.rail__btn:hover{transform:translateX(-3px) scale(1.04)}
.rail__btn svg{width:23px;height:23px}
.rail__cap{font-size:9.5px;font-weight:800;line-height:1;letter-spacing:0;white-space:nowrap}
.rail__btn--ch{background:#fae100;color:#3a1d1d}
.rail__btn--chat{background:#fae100;color:#3a1d1d}
.rail__btn--blog{background:#03c75a;color:#fff}
.rail__btn--kmd{background:var(--orange);color:#fff}
.rail__btn--top{width:66px;height:42px;border-radius:14px;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.3);color:#fff;opacity:0;pointer-events:none}
.rail__btn--top.is-on{opacity:1;pointer-events:auto}

/* ===================== BACK TO TOP (bottom-right) ===================== */
.to-top{position:fixed;right:22px;bottom:24px;z-index:55;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.34);backdrop-filter:blur(10px);color:#fff;opacity:0;transform:translateY(12px);pointer-events:none;transition:.22s}
.to-top.is-on{opacity:1;transform:none;pointer-events:auto}
.to-top:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}
.to-top svg{width:22px;height:22px}
.to-top span{font-size:9px;font-weight:800;letter-spacing:.08em}

/* ===================== NAV DROPDOWN + PARTNER INFO ===================== */
.nav__dd{position:relative}
.nav__dd-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:210px;background:rgba(8,18,34,.94);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:6px;display:none;flex-direction:column;gap:2px;box-shadow:0 18px 40px -12px rgba(0,0,0,.55)}
.nav__dd.open .nav__dd-menu{display:flex}
.nav__dd-menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;color:#fff;font-weight:700;font-size:14.5px;padding:12px 14px;border-radius:9px;white-space:nowrap;font-family:inherit;cursor:pointer}
.nav__dd-menu button:hover{background:rgba(255,255,255,.12)}
.nav__dd-menu svg{width:17px;height:17px;color:var(--gold)}
.nav__dd .chev{width:14px;height:14px;color:inherit;transition:.2s}
.nav__dd.open .chev{transform:rotate(180deg)}
.pinfo{margin:4px 0 24px;border-top:1px solid #eef2f7}
.pinfo>div{display:grid;grid-template-columns:72px 1fr;gap:14px;padding:15px 4px;border-bottom:1px solid #eef2f7}
.pinfo dt{font-weight:800;color:var(--accent);font-size:15px;margin:0}
.pinfo dd{margin:0;color:var(--ink);font-size:15.5px;font-weight:600}
.pinfo a{color:var(--ink);border-bottom:1px solid rgba(0,0,0,.25)}

/* ===================== SOUND TOGGLE ===================== */
.sound{position:fixed;right:22px;bottom:92px;z-index:50;display:grid;place-items:center;width:52px;height:52px;padding:0;border-radius:50%;background:rgba(8,18,34,.5);border:1px solid rgba(255,255,255,.4);color:#fff;backdrop-filter:blur(10px);transition:.18s}
.sound:hover{background:rgba(8,18,34,.78)}
.sound svg{width:22px;height:22px;grid-area:1/1}
.sound__x{grid-area:1/1;width:30px;height:30px;pointer-events:none;opacity:0;transition:.16s}
.sound__x line{stroke:#fff;stroke-width:2.4;stroke-linecap:round}
.sound.muted .sound__x{opacity:1}
.sound.muted{color:rgba(255,255,255,.78)}

/* ===================== MODALS ===================== */
.modal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:24px}
.modal.is-open{display:flex}
.modal__scrim{position:absolute;inset:0;background:rgba(6,12,22,.72);backdrop-filter:blur(4px)}
.modal__box{position:relative;width:100%;max-width:480px;background:#fff;color:var(--ink);border-radius:20px;padding:34px;box-shadow:0 30px 80px -20px rgba(0,0,0,.6);max-height:88vh;overflow:auto}
.modal__box--wide{max-width:560px}
.modal__close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;border:1px solid #e6ebf2;background:#f4f7fb;color:#5d6b7c;display:grid;place-items:center;font-size:20px;transition:.15s}
.modal__close:hover{background:#e9eef5}
.modal__eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:0 0 10px}
.modal__title{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:0 0 8px}
.modal__desc{color:#5d6b7c;font-size:15px;margin:0 0 22px;line-height:1.6}
.modal image-slot{width:100%;height:220px;display:block;margin:0 0 18px;border-radius:12px}
.modal__note{display:flex;gap:10px;align-items:flex-start;background:#faf5f0;border:1px solid #ece2da;border-radius:12px;padding:14px 16px;color:#7e1e00;font-size:13.5px;font-weight:600;margin:0 0 22px}
.modal__note svg{width:18px;height:18px;flex:none;margin-top:1px}
.modal .btn-primary{background:var(--accent);border-color:transparent;backdrop-filter:none}
.modal .btn-primary:hover{background:var(--accent-bright)}
.modal .btn-glass{background:#f4f7fb;color:var(--ink);border-color:#e6ebf2;backdrop-filter:none}
.modal .btn-glass:hover{background:#e9eef5}
.field{margin-bottom:16px}
.field label{display:block;font-weight:700;font-size:13.5px;margin-bottom:7px}
.field label .req{color:var(--accent)}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid #e6ebf2;border-radius:11px;font-family:inherit;font-size:15px;color:var(--ink);background:#f7f9fc;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(126,30,0,.08)}
.field textarea{resize:vertical;min-height:88px}
.field--error input,.field--error select{border-color:#d64545;background:#fdf0f0}
.field__err{display:none;color:#d64545;font-size:12px;font-weight:600;margin-top:5px}
.field--error .field__err{display:block}
.agree{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;color:#5d6b7c;margin:2px 0 18px}
.agree input{width:16px;height:16px;margin-top:2px;accent-color:var(--accent)}
.modal .btn-primary{width:100%}
.success{display:none;text-align:center;padding:18px 6px}
.success svg{width:56px;height:56px;color:#1f9d6b;margin:0 auto 14px}
.success h4{font-size:20px;font-weight:800;margin:0 0 8px}
.success p{color:#5d6b7c;margin:0;font-size:14.5px;line-height:1.6}
.is-sent .form-body{display:none}
.is-sent .success{display:block}

/* ===================== ENTRY POPUP ===================== */
.popup{position:fixed;inset:0;z-index:95;display:none;align-items:center;justify-content:center;padding:24px}
.popup.is-open{display:flex}
.popup__scrim{position:absolute;inset:0;background:rgba(5,11,20,.66);backdrop-filter:blur(7px)}
.popup__card{position:relative;width:100%;max-width:384px;border-radius:24px;overflow:hidden;max-height:92vh;display:flex;flex-direction:column;color:#fff;background:#0c1c30;border:1px solid rgba(255,255,255,.12);box-shadow:0 40px 100px -24px rgba(0,0,0,.72);animation:popIn .42s cubic-bezier(.2,.8,.2,1) both}
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}
.popup__x{position:absolute;top:14px;right:14px;z-index:4;width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.28);color:#fff;display:grid;place-items:center;font-size:17px;backdrop-filter:blur(6px);transition:.15s;cursor:pointer}
.popup__x:hover{background:rgba(0,0,0,.55)}
.popup__hero{position:relative;overflow:hidden}
.popup__hero img{display:block;width:100%;aspect-ratio:16/10;object-fit:cover}
.popup__hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,23,38,.05) 30%,rgba(12,28,48,.96))}
.popup__brand{position:relative;z-index:2;display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px;color:#fff}
.popup__brand b{color:var(--orange-bright);font-weight:900;font-size:19px;letter-spacing:.02em}
.popup__hero .popup__brand{position:absolute;left:24px;bottom:16px}
.popup__body{position:relative;padding:26px 24px 4px}
.popup__body--plain{padding-top:30px}
.popup__eyebrow{display:inline-flex;align-items:center;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--orange-bright);margin:0 0 14px;padding:6px 13px;border-radius:999px;background:color-mix(in srgb,var(--orange) 16%,transparent);border:1px solid color-mix(in srgb,var(--orange) 38%,transparent)}
.popup__title{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.28;margin:0 0 12px;color:#fff}
.popup__text{color:rgba(255,255,255,.72);font-size:15px;line-height:1.65;margin:0 0 24px;white-space:pre-line}
.popup__cta{display:inline-flex;width:100%;align-items:center;justify-content:center;gap:9px;padding:16px 20px;border-radius:14px;background:linear-gradient(150deg,var(--orange),var(--orange-bright));color:#fff;font-weight:800;font-size:16px;border:0;cursor:pointer;box-shadow:0 14px 30px -12px var(--orange);transition:.16s}
.popup__cta:hover{filter:brightness(1.08);transform:translateY(-2px)}
.popup__cta svg{width:19px;height:19px}
.popup__foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 24px 20px;margin-top:16px}
.popup__today{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.6);font-weight:600;cursor:pointer;white-space:nowrap}
.popup__today input{width:16px;height:16px;accent-color:var(--orange)}
.popup__close{background:none;border:0;color:rgba(255,255,255,.55);font-weight:700;font-size:13.5px;cursor:pointer;padding:6px 4px;white-space:nowrap}
.popup__close:hover{color:#fff}

/* ===================== RESPONSIVE ===================== */
@media(max-width:920px){
  .nav__menu{display:none}
